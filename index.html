<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <body class="m-0 p-0 overflow-x-hidden">
  <!-- 主内容区域 - 适配所有设备 -->
  <div class="relative flex flex-col justify-between bg-gradient-to-br from-gray-400 via-gray-500 to-gray-600 dark:from-white/90 dark:via-white/80 dark:to-white/70 p-4 md:p-8 lg:p-12 text-white dark:text-gray-900 min-h-screen">
    <!-- 标题 - 移动端优化 -->
    <div class="absolute top-4 left-1/2 -translate-x-1/2 text-center z-30">
      <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold text-white dark:text-gray-900 drop-shadow-lg">欢迎来到安乐窝</h1>
      <p class="mt-1 sm:mt-2 text-sm sm:text-base md:text-lg text-white/80 dark:text-gray-700">娱乐之旅启程🚴</p>
    </div>
    
    <!-- 移动端人物装饰 - 小尺寸适配 -->
    <div class="flex lg:hidden flex-col items-center justify-center flex-1 pt-16 pb-20">
      <div class="relative" style="width: 280px; height: 200px;">
        <!-- 移动端人物1 -->
        <div id="mobile-person1" class="absolute bottom-0 transition-transform duration-500" style="left: 35px; width: 90px; height: 200px; background-color: rgb(108, 63, 245); border-radius: 5px 5px 0px 0px;">
          <div class="absolute flex gap-4" style="left: 10px; top: 18px;">
            <div id="mobile-eye1-1" class="rounded-full bg-white" style="width: 9px; height: 9px;"></div>
            <div id="mobile-eye1-2" class="rounded-full bg-white" style="width: 9px; height: 9px;"></div>
          </div>
        </div>
        <!-- 移动端人物2 -->
        <div id="mobile-person2" class="absolute bottom-0 transition-transform duration-500" style="left: 120px; width: 60px; height: 155px; background-color: rgb(45, 45, 45); border-radius: 4px 4px 0px 0px;">
          <div class="absolute flex gap-3" style="left: 5px; top: 14px;">
            <div class="rounded-full bg-white" style="width: 8px; height: 8px;"></div>
            <div class="rounded-full bg-white" style="width: 8px; height: 8px;"></div>
          </div>
        </div>
        <!-- 移动端人物3 -->
        <div id="mobile-person3" class="absolute bottom-0" style="left: 0px; width: 120px; height: 100px; background-color: rgb(255, 155, 107); border-radius: 60px 60px 0px 0px;">
          <div class="absolute flex gap-4" style="left: 25px; top: 42px;">
            <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45);"></div>
            <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45);"></div>
          </div>
        </div>
        <!-- 移动端人物4 -->
        <div id="mobile-person4" class="absolute bottom-0" style="left: 155px; width: 70px; height: 115px; background-color: rgb(232, 215, 84); border-radius: 35px 35px 0px 0px;">
          <div class="absolute flex gap-3" style="left: 10px; top: 18px;">
            <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45);"></div>
            <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45);"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 桌面端人物展示 -->
    <div class="hidden lg:flex relative z-20 items-end justify-center h-[500px]">
      <div class="relative" style="width:550px;height:400px">
        
        <!-- 人物1 -->
        <div id="person1" class="absolute bottom-0 transition-all duration-700 ease-in-out" style="left: 70px; width: 180px; height: 400px; background-color: rgb(108, 63, 245); border-radius: 10px 10px 0px 0px; z-index: 1; transform: skewX(0deg); transform-origin: center bottom;">
          <div class="absolute flex gap-8 transition-all duration-700 ease-in-out" id="eye1" style="left: 20px; top: 35px;">
            <div class="rounded-full flex items-center justify-center transition-all duration-150" style="width: 18px; height: 18px; background-color: white; overflow: hidden;" id="eye1-1">
              <div class="rounded-full" style="width: 7px; height: 7px; background-color: rgb(45, 45, 45); transform: translate(4px, 5px); transition: transform 0.1s ease-out;"></div>
            </div>
            <div class="rounded-full flex items-center justify-center transition-all duration-150" style="width: 18px; height: 18px; background-color: white; overflow: hidden;" id="eye1-2">
              <div class="rounded-full" style="width: 7px; height: 7px; background-color: rgb(45, 45, 45); transform: translate(4px, 5px); transition: transform 0.1s ease-out;"></div>
            </div>
          </div>
        </div>

        <!-- 人物2 -->
        <div id="person2" class="absolute bottom-0 transition-all duration-700 ease-in-out" style="left: 240px; width: 120px; height: 310px; background-color: rgb(45, 45, 45); border-radius: 8px 8px 0px 0px; z-index: 2; transform: skewX(0deg); transform-origin: center bottom;">
          <div class="absolute flex gap-6 transition-all duration-700 ease-in-out" id="eye2" style="left: 10px; top: 28px;">
            <div class="rounded-full flex items-center justify-center transition-all duration-150" style="width: 16px; height: 16px; background-color: white; overflow: hidden;" id="eye2-3">
              <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45); transform: translate(-4px, -4px); transition: transform 0.1s ease-out;"></div>
            </div>
            <div class="rounded-full flex items-center justify-center transition-all duration-150" style="width: 16px; height: 16px; background-color: white; overflow: hidden;" id="eye2-4">
              <div class="rounded-full" style="width: 6px; height: 6px; background-color: rgb(45, 45, 45); transform: translate(-4px, -4px); transition: transform 0.1s ease-out;"></div>
            </div>
          </div>
        </div>

        <!-- 人物3 -->
        <div id="person3" class="absolute bottom-0 transition-all duration-700 ease-in-out" style="left: 0px; width: 240px; height: 200px; z-index: 3; background-color: rgb(255, 155, 107); border-radius: 120px 120px 0px 0px; transform: skewX(0deg); transform-origin: center bottom;">
          <div class="absolute flex gap-8 transition-all duration-200 ease-out" id="eye5" style="left: 50px; top: 85px;">
            <div class="rounded-full" style="width: 12px; height: 12px; background-color: rgb(45, 45, 45); transform: translate(-5px, -4px); transition: transform 0.1s ease-out;"></div>
            <div class="rounded-full" style="width: 12px; height: 12px; background-color: rgb(45, 45, 45); transform: translate(-5px, -4px); transition: transform 0.1s ease-out;"></div>
          </div>
        </div>

        <!-- 人物4 -->
        <div id="person4" class="absolute bottom-0 transition-all duration-700 ease-in-out" style="left: 310px; width: 140px; height: 230px; background-color: rgb(232, 215, 84); border-radius: 70px 70px 0px 0px; z-index: 4; transform: skewX(0deg); transform-origin: center bottom;">
          <div class="absolute flex gap-6 transition-all duration-200 ease-out" id="eye6" style="left: 20px; top: 35px;">
            <div class="rounded-full" style="width: 12px; height: 12px; background-color: rgb(45, 45, 45); transform: translate(-5px, -4px); transition: transform 0.1s ease-out;"></div>
            <div class="rounded-full" style="width: 12px; height: 12px; background-color: rgb(45, 45, 45); transform: translate(-5px, -4px); transition: transform 0.1s ease-out;"></div>
          </div>
          <div class="absolute w-20 h-[4px] bg-[#2D2D2D] rounded-full transition-all duration-200 ease-out" id="eye6-1" style="left: 10px; top: 88px;"></div>
        </div>

      </div>
    </div>

  <div class="absolute inset-0 bg-grid-white/[0.05] bg-[size:20px_20px]"></div>
  <div class="absolute top-1/4 right-1/4 size-64 bg-gray-400/20 dark:bg-gray-300/30 rounded-full blur-3xl"></div>
  <div class="absolute bottom-1/4 left-1/4 size-96 bg-gray-300/20 dark:bg-gray-200/20 rounded-full blur-3xl"></div>
  
  <!-- 移动端装饰星星 - 仅在移动端显示 -->
  <div class="absolute top-16 left-4 z-10 animate-pulse lg:hidden">
    <div class="text-2xl">⭐</div>
  </div>
  <div class="absolute top-20 right-4 z-10 animate-pulse lg:hidden" style="animation-delay: 0.5s;">
    <div class="text-xl">✨</div>
  </div>
  <div class="absolute bottom-32 left-4 z-10 animate-pulse lg:hidden" style="animation-delay: 1s;">
    <div class="text-xl">🌟</div>
  </div>
  
  <!-- 桌面端装饰星星 - 仅在桌面端显示 -->
  <div class="hidden lg:block absolute top-20 left-20 z-10 animate-pulse">
    <div class="text-3xl">⭐</div>
  </div>
  <div class="hidden lg:block absolute top-32 right-32 z-10 animate-pulse" style="animation-delay: 0.5s;">
    <div class="text-2xl">✨</div>
  </div>
  <div class="hidden lg:block absolute top-16 right-20 z-10 animate-pulse" style="animation-delay: 1s;">
    <div class="text-2xl">🌟</div>
  </div>
  <div class="hidden lg:block absolute bottom-40 left-16 z-10 animate-pulse" style="animation-delay: 0.3s;">
    <div class="text-xl">💫</div>
  </div>
  <div class="hidden lg:block absolute bottom-48 right-16 z-10 animate-pulse" style="animation-delay: 0.7s;">
    <div class="text-2xl">🌈</div>
  </div>
  
  <!-- 云朵装饰 - 移动端 -->
  <div class="absolute top-20 left-4 z-10 opacity-60 lg:hidden">
    <div class="text-3xl">☁️</div>
  </div>
  <!-- 云朵装饰 - 桌面端 -->
  <div class="hidden lg:block absolute top-24 left-1/4 z-10 opacity-60">
    <div class="text-5xl">☁️</div>
  </div>
  <div class="hidden lg:block absolute top-16 left-3/4 z-10 opacity-40">
    <div class="text-4xl">☁️</div>
  </div>
  
  <!-- 移动端页脚和按钮 -->
  <div class="flex lg:hidden fixed bottom-0 left-0 right-0 justify-center items-center gap-4 pb-6 pt-4 bg-gradient-to-t from-gray-500/80 via-gray-500/40 to-transparent">
    <p class="text-xs text-white/60 dark:text-gray-600">© 2026 PrivateNet</p>
    <a href="./privatenet.html" class="px-6 py-2 bg-white text-gray-800 font-semibold rounded-full hover:bg-gray-100 transition-all duration-300 shadow-lg cursor-pointer text-sm active:scale-95 touch-manipulation">
      Enter
    </a>
  </div>
  
  <!-- 桌面端页脚信息 -->
  <div class="hidden lg:block absolute bottom-2 left-1/2 -translate-x-1/2 text-center z-30">
    <p class="text-sm text-white/60 dark:text-gray-600">© 2026 PrivateNet</p>
  </div>
  
  <!-- 桌面端 Enter Button -->
  <div class="hidden lg:block absolute right-8 bottom-8 z-50">
    <a href="./privatenet.html" class="px-8 py-3 bg-white text-gray-800 font-semibold rounded-full hover:bg-gray-100 transition-colors duration-300 shadow-lg cursor-pointer inline-block">
      Enter
    </a>
  </div>
  </div>

<script>
// 检测是否为移动设备
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1024;

// 桌面端眼睛跟随鼠标
function draw1(id, mouseX, mouseY) {
  let rect = document.getElementById(id);
  if (!rect) return;
  const centerX = rect.offsetLeft + rect.clientWidth / 2;
  const centerY = rect.offsetTop + rect.clientHeight / 2;
  let angle = Math.atan2(mouseY - centerY, mouseX - centerX);
  let dist = Math.min(Math.sqrt((mouseX - centerX) ** 2 + (mouseY - centerY) ** 2), 5);
  rect.innerHTML = `<div class="rounded-full" style="width:7px;height:7px;background-color:rgb(45,45,45);transform:translate(${Math.cos(angle) * dist}px,${Math.sin(angle) * dist}px);transition:transform 0.1s ease-out"></div>`;
}

// 桌面端眼球左右移动
function draw2(id, mouseX, mouseY, min, max) {
  let rect = document.getElementById(id);
  if (!rect) return;
  let w = document.body.clientWidth / 2;
  if (mouseX < w) {
    rect.style.left = min + 'px';
  } else {
    rect.style.left = max + 'px';
  }
}

// 桌面端眨眼睛
function draw4(id1, id2, min, max, f) {
  let rect1 = document.getElementById(id1);
  let rect2 = document.getElementById(id2);
  if (!rect1 || !rect2) return;
  if (f) {
    rect1.style.height = max + 'px';
    rect2.style.height = max + 'px';
    desktopBlinking();
  } else {
    rect1.style.height = min + 'px';
    rect2.style.height = min + 'px';
    setTimeout(function () {
      draw4(id1, id2, min, max, 1);
    }, 200);
  }
}

// 随机眨眼时间
function getRandom() {
  return Math.floor(Math.random() * 2001 + 2000);
}

// 桌面端随机眨眼
function desktopBlinking() {
  setTimeout(function () {
    draw4('eye1-1', 'eye1-2', 2, 18);
  }, getRandom());
}

// 桌面端鼠标移动监听
const handleMove = (e) => {
  let mouseX = e.clientX;
  let mouseY = e.clientY;
  draw2('eye1', mouseX, mouseY, 20, 80);
  draw1('eye1-1', mouseX, mouseY);
  draw1('eye1-2', mouseX, mouseY);
  draw2('eye2', mouseX, mouseY, 10, 40);
  draw1('eye2-3', mouseX, mouseY);
  draw1('eye2-4', mouseX, mouseY);
  draw2('eye5', mouseX, mouseY, 40, 140);
  draw2('eye6', mouseX, mouseY, 20, 70);
  draw2('eye6-1', mouseX, mouseY, 10, 50);
};

// 桌面端点击踮脚动画
var inum = 0;
function bodyStyle() {
  inum++;
  if (inum % 3 === 0) {
    return 'transform:skewX(0deg)';
  }
  if (inum % 5 === 0) {
    return 'transform:skewX(-9deg) translateX(40px);height:440px';
  }
  if (inum % 4 === 0) {
    return 'height:440px';
  }
  return 'transform:skewX(-9deg)';
}

function desktopClickView(e) {
  if (e.target.tagName === 'BUTTON' || e.target.closest('button') || e.target.tagName === 'A' || e.target.closest('a')) {
    return;
  }
  let style = bodyStyle();
  let person1 = document.getElementById("person1");
  if (!person1) return;
  person1.setAttribute('style', "left: 70px; width: 180px; height: 400px; background-color: rgb(108, 63, 245); border-radius: 10px 10px 0px 0px; z-index: 1; transform-origin: center bottom;" + style);
  let eye1 = document.getElementById("eye1");
  if (eye1) {
    if (style.indexOf('translateX') > -1) {
      eye1.style.left = "80px";
    } else {
      eye1.style.left = "20px";
    }
  }
}

// 移动端人物动画 - 轻微晃动
function mobilePersonAnimation() {
  let mobilePerson1 = document.getElementById('mobile-person1');
  let mobilePerson2 = document.getElementById('mobile-person2');
  
  if (mobilePerson1) {
    mobilePerson1.style.transform = 'skewX(-3deg)';
    setTimeout(() => {
      if (mobilePerson1) mobilePerson1.style.transform = 'skewX(2deg)';
    }, 500);
    setTimeout(() => {
      if (mobilePerson1) mobilePerson1.style.transform = 'skewX(0deg)';
    }, 1000);
  }
  
  if (mobilePerson2) {
    mobilePerson2.style.transform = 'skewX(-2deg)';
    setTimeout(() => {
      if (mobilePerson2) mobilePerson2.style.transform = 'skewX(1deg)';
    }, 600);
    setTimeout(() => {
      if (mobilePerson2) mobilePerson2.style.transform = 'skewX(0deg)';
    }, 1200);
  }
}

// 移动端随机动画
function mobileRandomAnimation() {
  setInterval(() => {
    if (Math.random() > 0.5) {
      mobilePersonAnimation();
    }
  }, 3000);
}

// 移动端触摸事件
function setupMobileEvents() {
  // 触摸移动 - 移动端人物跟随触摸位置轻微倾斜
  document.addEventListener('touchmove', function(e) {
    if (e.target.tagName === 'A' || e.target.closest('a')) return;
    
    let touch = e.touches[0];
    let mobilePerson1 = document.getElementById('mobile-person1');
    let mobilePerson2 = document.getElementById('mobile-person2');
    
    let w = window.innerWidth;
    if (touch.clientX < w / 2) {
      if (mobilePerson1) mobilePerson1.style.transform = 'skewX(-5deg)';
      if (mobilePerson2) mobilePerson2.style.transform = 'skewX(-3deg)';
    } else {
      if (mobilePerson1) mobilePerson1.style.transform = 'skewX(5deg)';
      if (mobilePerson2) mobilePerson2.style.transform = 'skewX(3deg)';
    }
  });
  
  // 触摸结束 - 恢复原状
  document.addEventListener('touchend', function(e) {
    let mobilePerson1 = document.getElementById('mobile-person1');
    let mobilePerson2 = document.getElementById('mobile-person2');
    
    if (mobilePerson1) mobilePerson1.style.transform = 'skewX(0deg)';
    if (mobilePerson2) mobilePerson2.style.transform = 'skewX(0deg)';
  });
  
  // 触摸点击移动端人物
  document.addEventListener('touchstart', function(e) {
    if (e.target.tagName === 'A' || e.target.closest('a') || e.target.tagName === 'BUTTON') return;
    
    // 移动端点击动画
    mobilePersonAnimation();
  });
  
  // 启动移动端随机动画
  mobileRandomAnimation();
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  if (window.innerWidth >= 1024) {
    // 桌面端
    blinking();
    window.addEventListener("mousemove", handleMove);
    document.addEventListener("click", desktopClickView);
  } else {
    // 移动端
    setupMobileEvents();
  }
});

// 窗口大小改变时重新检测
window.addEventListener('resize', function() {
  if (window.innerWidth >= 1024) {
    // 切换到桌面端
    let mobilePerson1 = document.getElementById('mobile-person1');
    let mobilePerson2 = document.getElementById('mobile-person2');
    if (mobilePerson1) mobilePerson1.style.transform = 'skewX(0deg)';
    if (mobilePerson2) mobilePerson2.style.transform = 'skewX(0deg)';
    
    // 重新加载页面以应用桌面端效果
    location.reload();
  }
});
</script>
</body>
</html>
