<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrivateNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 整体缩放容器 */
    .scale-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom right, #6b7280, #4b5563, #374151);
    }
    
    .dark .scale-container {
      background: linear-gradient(to bottom right, rgba(255,255,255,0.9), rgba(255,255,255,0.8), rgba(255,255,255,0.7));
    }
    
    /* 缩放的内容 */
    .scaled-content {
      position: relative;
      width: 100%;
      max-width: 1200px;
      height: 100vh;
      max-height: 800px;
      padding: 48px;
    }
    
    /* 响应式缩放 */
    @media (max-width: 1200px) {
      .scaled-content {
        padding: 32px;
      }
    }
    
    @media (max-width: 768px) {
      .scaled-content {
        padding: 16px;
      }
    }
    
    /* 背景网格 */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }
    
    /* 模糊光晕 */
    .glow-1 {
      position: absolute;
      top: 25%;
      right: 25%;
      width: 256px;
      height: 256px;
      background: rgba(156, 163, 175, 0.2);
      border-radius: 50%;
      filter: blur(64px);
    }
    
    .dark .glow-1 {
      background: rgba(209, 213, 219, 0.3);
    }
    
    .glow-2 {
      position: absolute;
      bottom: 25%;
      left: 25%;
      width: 384px;
      height: 384px;
      background: rgba(203, 213, 225, 0.2);
      border-radius: 50%;
      filter: blur(64px);
    }
    
    .dark .glow-2 {
      background: rgba(226, 232, 240, 0.2);
    }
    
    /* 人物容器 */
    .persons-container {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 550px;
      height: 400px;
    }
    
    @media (max-width: 768px) {
      .persons-container {
        width: 320px;
        height: 240px;
      }
    }
    
    @media (max-width: 480px) {
      .persons-container {
        width: 280px;
        height: 200px;
      }
    }
    
    /* 人物样式 */
    .person {
      position: absolute;
      bottom: 0;
      transition: transform 0.5s ease-in-out;
    }
    
    .person-1 {
      left: 70px;
      width: 180px;
      height: 400px;
      background-color: rgb(108, 63, 245);
      border-radius: 10px 10px 0px 0px;
      z-index: 1;
    }
    
    @media (max-width: 768px) {
      .person-1 {
        left: 35px;
        width: 100px;
        height: 220px;
        border-radius: 6px 6px 0px 0px;
      }
    }
    
    @media (max-width: 480px) {
      .person-1 {
        left: 30px;
        width: 80px;
        height: 180px;
        border-radius: 4px 4px 0px 0px;
      }
    }
    
    .person-2 {
      left: 240px;
      width: 120px;
      height: 310px;
      background-color: rgb(45, 45, 45);
      border-radius: 8px 8px 0px 0px;
      z-index: 2;
    }
    
    @media (max-width: 768px) {
      .person-2 {
        left: 125px;
        width: 65px;
        height: 170px;
        border-radius: 4px 4px 0px 0px;
      }
    }
    
    @media (max-width: 480px) {
      .person-2 {
        left: 105px;
        width: 55px;
        height: 145px;
        border-radius: 3px 3px 0px 0px;
      }
    }
    
    .person-3 {
      left: 0px;
      width: 240px;
      height: 200px;
      background-color: rgb(255, 155, 107);
      border-radius: 120px 120px 0px 0px;
      z-index: 3;
    }
    
    @media (max-width: 768px) {
      .person-3 {
        left: 0px;
        width: 130px;
        height: 110px;
        border-radius: 65px 65px 0px 0px;
      }
    }
    
    @media (max-width: 480px) {
      .person-3 {
        left: 0px;
        width: 110px;
        height: 90px;
        border-radius: 55px 55px 0px 0px;

    .person-4 {

    /* 眼睛容器 */
    .eye-container {

    }
    
    .eye1-container {

    }

    }
    
    @media (max-width: 768px) {
      .eye5-container {

    /* 眼睛 */
    .eye {

    }
    
    .eye-white {

    }

      background-color: rgb(45, 45, 45);

    }
    
    /* 人物1眼睛 */
    .eye1-1, .eye1-2 {

    }
    
    .eye1-1 .eye-pupil, .eye1-2 .eye-pupil {
      width: 7px;

      transform: translate(4px, 5px);
    }

      .eye1-1, .eye1-2 {

        height: 10px;
      }

        transform: translate(2px, 3px);

    }

      }

    /* 人物2眼睛 */

        height: 3px;

    @media (max-width: 480px) {

    /* 人物3眼睛 - 黑色圆点眼睛 */

    /* 人物4嘴巴 */

    /* 标题 */

    /* Enter按钮 */

<body class="m-0 p-0 overflow-hidden">
  <div class="scale-container">

<script>
(function() {
  // 获取视口宽度
  function getViewportWidth() {
    return window.innerWidth;
  }
  
  // 获取人物容器尺寸
  function getPersonContainerSize() {
    const personsContainer = document.querySelector('.persons-container');
    if (!personsContainer) return { width: 550, height: 400 };
    return {
      width: personsContainer.offsetWidth,
      height: personsContainer.offsetHeight
    };
  }
  
  // 计算缩放比例
  function getScaleFactor() {
    const containerSize = getPersonContainerSize();
    // 基准尺寸
    const baseWidth = 550;
    const baseHeight = 400;
    return {
      width: containerSize.width / baseWidth,
      height: containerSize.height / baseHeight
    };
  }
  
  // 桌面端眼睛跟随鼠标
  function draw1(id, mouseX, mouseY) {
    const rect = document.getElementById(id);
    if (!rect) return;
    
    const container = document.querySelector('.persons-container');
    if (!container) return;
    
    const containerRect = container.getBoundingClientRect();
    const rectRect = rect.getBoundingClientRect();
    
    // 计算相对于容器的位置
    const relX = mouseX - containerRect.left;
    const relY = mouseY - containerRect.top;
    
    // 获取当前眼睛位置
    const eyeRect = rect.getBoundingClientRect();
    const eyeRelX = eyeRect.left - containerRect.left + eyeRect.width / 2;
    const eyeRelY = eyeRect.top - containerRect.top + eyeRect.height / 2;
    
    const angle = Math.atan2(relY - eyeRelY, relX - eyeRelX);
    const dist = Math.min(Math.sqrt((relX - eyeRelX) ** 2 + (relY - eyeRelY) ** 2), 5);
    
    const pupil = rect.querySelector('.eye-pupil');
    if (pupil) {
      const scale = getScaleFactor();
      pupil.style.transform = `translate(${Math.cos(angle) * dist * scale.width}px, ${Math.sin(angle) * dist * scale.height}px)`;
    }
  }
  
  // 眼球左右移动
  function draw2(id, mouseX, mouseY, min, max) {
    const rect = document.getElementById(id);
    if (!rect) return;
    
    const container = document.querySelector('.persons-container');
    if (!container) return;
    
    const containerRect = container.getBoundingClientRect();
    const w = containerRect.width / 2;
    
    const relX = mouseX - containerRect.left;
    
    const scale = getScaleFactor();
    if (relX < w) {
      rect.style.left = (min * scale.width) + 'px';
    } else {
      rect.style.left = (max * scale.width) + 'px';
    }
  }
  
  // 眨眼睛
  function draw4(id1, id2, min, max, f) {
    const rect1 = document.getElementById(id1);
    const rect2 = document.getElementById(id2);
    if (!rect1 || !rect2) return;
    
    const scale = getScaleFactor();
    
    if (f) {
      rect1.style.height = (max * scale.height) + 'px';
      rect2.style.height = (max * scale.height) + 'px';
      blinking();
    } else {
      rect1.style.height = (min * scale.height) + 'px';
      rect2.style.height = (min * scale.height) + 'px';
      setTimeout(function() {
        draw4(id1, id2, min, max, 1);
      }, 200);
    }
  }
  
  // 随机时间
  function getRandom() {
    return Math.floor(Math.random() * 2001 + 2000);
  }
  
  // 随机眨眼
  function blinking() {
    setTimeout(function() {
      draw4('eye1-1', 'eye1-2', 2, 18);
    }, getRandom());
  }
  
  // 鼠标/触摸移动监听
  function handleMove(e) {
    let clientX, clientY;
    
    if (e.touches && e.touches.length > 0) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    
    const scale = getScaleFactor();
    
    draw2('eye1', clientX, clientY, 20, 80);
    draw1('eye1-1', clientX, clientY);
    draw1('eye1-2', clientX, clientY);
    draw2('eye2', clientX, clientY, 10, 40);
    draw1('eye2-1', clientX, clientY);
    draw1('eye2-2', clientX, clientY);
    draw2('eye5', clientX, clientY, 40, 140);
    draw2('eye6', clientX, clientY, 20, 70);
    draw2('eye6-1', clientX, clientY, 10, 50);
  }
  
  // 点击踮脚动画
  let inum = 0;
  function bodyStyle() {
    inum++;
    if (inum % 3 === 0) {
      return 'transform:skewX(0deg)';
    }
    if (inum % 5 === 0) {
      return 'transform:skewX(-9deg) translateX(40px);height:440px';
    }
    if (inum % 4 === 0) {
      return 'height:440px';
    }
    return 'transform:skewX(-9deg)';
  }
  
  function clickView(e) {
    if (e.target.tagName === 'A' || e.target.closest('a')) {
      return;
    }
    
    const person1 = document.getElementById("person1");
    if (!person1) return;
    
    const scale = getScaleFactor();
    let style = bodyStyle();
    
    // 根据缩放比例调整样式
    if (style.includes('translateX')) {
      const translateX = 40 * scale.width;
      const height = 440 * scale.height;
      person1.style.transform = `skewX(-9deg) translateX(${translateX}px)`;
      person1.style.height = height + 'px';
    } else if (style.includes('skewX(-9deg)')) {
      person1.style.transform = 'skewX(-9deg)';
      person1.style.height = '';
    } else if (style.includes('height:440px')) {
      person1.style.transform = 'skewX(0deg)';
      person1.style.height = (440 * scale.height) + 'px';
    } else {
      person1.style.transform = 'skewX(0deg)';
      person1.style.height = '';
    }
    
    const eye1 = document.getElementById("eye1");
    if (eye1) {
      if (style.indexOf('translateX') > -1) {
        eye1.style.left = (80 * scale.width) + 'px';
      } else {
        eye1.style.left = (20 * scale.width) + 'px';
      }
    }
  }
  
  // 初始化事件监听
  function init() {
    blinking();
    
    // 鼠标移动
    window.addEventListener("mousemove", handleMove);
    
    // 触摸移动
    window.addEventListener("touchmove", function(e) {
      if (e.target.tagName === 'A' || e.target.closest('a')) return;
      handleMove(e);
    });
    
    // 点击/触摸
    document.addEventListener("click", clickView);
    document.addEventListener("touchstart", function(e) {
      if (e.target.tagName === 'A' || e.target.closest('a')) return;
      clickView(e);
    });
  }
  
  // DOM加载完成后初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
